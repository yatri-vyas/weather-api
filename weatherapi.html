<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f2f2f2;
        }

        .weather-card {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        #weatherResult {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="weather-card">

        <h3 class="text-center mb-3">Weather App</h3>

        <!-- City Input -->
        <input type="text" id="cityInput" class="form-control mb-3" placeholder="Enter city name">

        <!-- Button -->
        <button id="getWeather" class="btn btn-primary w-100">
            Get Weather
        </button>

        <!-- Weather Result -->
        <div id="weatherResult" class="text-center">

            <h4 id="cityName"></h4>
            <p id="temperature"></p>
            <p id="description"></p>

        </div>

    </div>
    <script src="scriptweather.js"></script>
</body>

</html>
